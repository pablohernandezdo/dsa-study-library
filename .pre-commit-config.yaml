repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        pass_filenames: false
        files: ^(src|tests)/

      - id: ruff-check
        name: Ruff Check
        entry: uv run ruff check
        language: system
        pass_filenames: false
        files: ^(src|tests)/

      - id: mypy
        name: MyPy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        files: ^(src|tests)/

      - id: pytest
        name: Pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        files: ^(src|tests)/